<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS2101 Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171f;
    --card-front: #1c1c27;
    --card-back: #141b2d;
    --border: rgba(255,255,255,0.07);
    --accent: #7b8cff;
    --accent2: #ff7b9c;
    --accent3: #7bffd4;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --tag-ai: #3b4fd4;
    --tag-fuzzy: #7b3bb8;
    --tag-swarm: #1d7a5c;
    --tag-ml: #7a3b1d;
    --tag-ga: #7a6b1d;
    --tag-bonus: #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── header ── */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .stats {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    gap: 20px;
  }

  .stat-val { color: var(--accent); font-weight: 500; }

  /* ── filters ── */
  .filters {
    padding: 18px 40px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .filter-btn[data-topic="all"].active    { background: var(--accent); }
  .filter-btn[data-topic="ai"].active     { background: var(--tag-ai); border-color: var(--tag-ai); }
  .filter-btn[data-topic="fuzzy"].active  { background: var(--tag-fuzzy); border-color: var(--tag-fuzzy); }
  .filter-btn[data-topic="swarm"].active  { background: var(--tag-swarm); border-color: var(--tag-swarm); }
  .filter-btn[data-topic="ml"].active     { background: var(--tag-ml); border-color: var(--tag-ml); }
  .filter-btn[data-topic="ga"].active     { background: var(--tag-ga); border-color: var(--tag-ga); }
  .filter-btn[data-topic="bonus"].active  { background: var(--tag-bonus); border-color: var(--tag-bonus); }

  /* ── main area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 32px;
  }

  /* ── progress bar ── */
  .progress-wrap {
    width: 100%;
    max-width: 640px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── card ── */
  .card-scene {
    width: 100%;
    max-width: 640px;
    height: 340px;
    perspective: 1400px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: box-shadow 0.3s;
  }

  .card-scene:hover .card-face {
    box-shadow: 0 0 0 1px rgba(123,140,255,0.2), 0 20px 60px rgba(0,0,0,0.5);
  }

  .card-front {
    background: var(--card-front);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
  }

  .card-topic-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'DM Mono', monospace;
    align-self: flex-start;
  }

  .tag-ai     { background: rgba(59,79,212,0.25); color: #8fa3ff; }
  .tag-fuzzy  { background: rgba(123,59,184,0.25); color: #c4a0ff; }
  .tag-swarm  { background: rgba(29,122,92,0.25);  color: #7bffd4; }
  .tag-ml     { background: rgba(122,59,29,0.25);  color: #ffb07b; }
  .tag-ga     { background: rgba(122,107,29,0.25); color: #ffe07b; }
  .tag-bonus  { background: rgba(74,74,106,0.25);  color: #b0b0d4; }

  .card-question {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    line-height: 1.45;
    color: var(--text);
    flex: 1;
    display: flex;
    align-items: center;
    padding: 20px 0 16px;
  }

  .card-hint {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-hint svg { opacity: 0.5; }

  .card-answer-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent3);
    opacity: 0.8;
  }

  .card-answer {
    font-size: 1rem;
    line-height: 1.7;
    color: #c8c8e0;
    flex: 1;
    display: flex;
    align-items: center;
    padding: 16px 0;
    font-weight: 300;
  }

  .card-answer strong {
    color: var(--text);
    font-weight: 600;
  }

  .card-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* ── controls ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 11px 24px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(123,140,255,0.08); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .btn-primary:hover { background: #8f9eff; border-color: #8f9eff; color: #fff; }

  .btn-icon {
    padding: 11px 14px;
  }

  /* ── known/unknown buttons ── */
  .feedback-row {
    display: flex;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .feedback-row.visible {
    opacity: 1;
    pointer-events: all;
  }

  .btn-known {
    background: rgba(29,122,92,0.15);
    border-color: rgba(123,255,212,0.25);
    color: var(--accent3);
  }

  .btn-known:hover { background: rgba(29,122,92,0.3); color: var(--accent3); border-color: var(--accent3); }

  .btn-unknown {
    background: rgba(255,123,156,0.1);
    border-color: rgba(255,123,156,0.2);
    color: var(--accent2);
  }

  .btn-unknown:hover { background: rgba(255,123,156,0.2); color: var(--accent2); border-color: var(--accent2); }

  /* ── empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }

  .empty-state h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--muted); margin-bottom: 10px; }
  .empty-state p { color: var(--muted); font-size: 0.9rem; }

  /* ── done state ── */
  .done-state {
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
  }

  .done-state.visible { display: flex; }

  .done-emoji { font-size: 3rem; }
  .done-title { font-family: 'DM Serif Display', serif; font-size: 2rem; }
  .done-score { font-family: 'DM Mono', monospace; font-size: 1.1rem; color: var(--accent); }
  .done-sub { color: var(--muted); font-size: 0.9rem; max-width: 340px; line-height: 1.6; }

  /* ── keyboard hint ── */
  .keyboard-hints {
    display: flex;
    gap: 16px;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  kbd {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }

  @media (max-width: 640px) {
    header { padding: 20px; }
    .filters { padding: 14px 20px; }
    .main { padding: 24px 16px; }
    .card-scene { height: 380px; }
    .card-face { padding: 28px 24px; }
    .card-question { font-size: 1.2rem; }
    .keyboard-hints { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AIS2101 <span>Flashcards</span></div>
  <div class="stats">
    <span>Known: <span class="stat-val" id="stat-known">0</span></span>
    <span>Review: <span class="stat-val" id="stat-review">0</span></span>
    <span>Remaining: <span class="stat-val" id="stat-remaining">0</span></span>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-topic="all">All Topics</button>
  <button class="filter-btn" data-topic="ai">AI Foundations</button>
  <button class="filter-btn" data-topic="fuzzy">Fuzzy Expert Systems</button>
  <button class="filter-btn" data-topic="swarm">Swarm Intelligence</button>
  <button class="filter-btn" data-topic="ml">Machine Learning</button>
  <button class="filter-btn" data-topic="ga">Genetic Algorithms</button>
  <button class="filter-btn" data-topic="bonus">Hybrid Systems</button>
</div>

<div class="main">

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 0</div>
  </div>

  <div class="card-scene" id="card-scene" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front">
        <div class="card-topic-tag" id="front-tag"></div>
        <div class="card-question" id="card-question"></div>
        <div class="card-hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
          Click to reveal answer
        </div>
      </div>
      <div class="card-face card-back">
        <div class="card-answer-label">Answer</div>
        <div class="card-answer" id="card-answer"></div>
        <div class="card-number" id="card-number"></div>
      </div>
    </div>
  </div>

  <div class="feedback-row" id="feedback-row">
    <button class="btn btn-unknown" onclick="markCard(false)">✗ Need Review</button>
    <button class="btn btn-known" onclick="markCard(true)">✓ Got It</button>
  </div>

  <div class="controls">
    <button class="btn btn-icon" onclick="prevCard()" title="Previous">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
    </button>
    <button class="btn btn-primary" onclick="nextCard()">Next Card →</button>
    <button class="btn btn-icon" onclick="shuffleCards()" title="Shuffle">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
    </button>
    <button class="btn btn-icon" onclick="resetCards()" title="Reset">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.83"/></svg>
    </button>
  </div>

  <div class="keyboard-hints">
    <span><kbd>Space</kbd> flip</span>
    <span><kbd>→</kbd> next</span>
    <span><kbd>←</kbd> prev</span>
    <span><kbd>K</kbd> got it</span>
    <span><kbd>R</kbd> review</span>
    <span><kbd>S</kbd> shuffle</span>
  </div>

  <div class="done-state" id="done-state">
    <div class="done-emoji">🎓</div>
    <div class="done-title">Deck Complete!</div>
    <div class="done-score" id="done-score"></div>
    <div class="done-sub" id="done-sub"></div>
    <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center;">
      <button class="btn btn-primary" onclick="resetCards()">Start Over</button>
      <button class="btn" onclick="reviewWrong()">Review Missed Cards</button>
    </div>
  </div>

</div>

<script>
const ALL_CARDS = [
  // ── AI FOUNDATIONS ──────────────────────────────────────────────────
  { topic:'ai', q:'What does PEAS stand for?', a:'<strong>P</strong>erformance measure, <strong>E</strong>nvironment, <strong>A</strong>ctuators, <strong>S</strong>ensors. It is the framework used to fully describe any intelligent agent and its interaction with the world.' },
  { topic:'ai', q:'What is a rational agent?', a:'An agent that acts so as to maximise its expected performance measure, given what it perceives and what it knows. It does the "right thing" given its knowledge — not necessarily the optimal thing.' },
  { topic:'ai', q:'What is the difference between fully observable and partially observable environments?', a:'In a <strong>fully observable</strong> environment, the agent can see everything relevant at any moment (e.g., chess). In a <strong>partially observable</strong> environment, information is hidden (e.g., poker — opponents\' cards are unknown).' },
  { topic:'ai', q:'What is the difference between a deterministic and a stochastic environment?', a:'<strong>Deterministic</strong>: a given action always produces the same result (e.g., chess). <strong>Stochastic</strong>: outcomes are uncertain due to randomness (e.g., driving in traffic — a pedestrian may step out unexpectedly).' },
  { topic:'ai', q:'What is an episodic vs. a sequential environment?', a:'<strong>Episodic</strong>: each decision is independent of previous ones (e.g., spam filtering — each email is judged alone). <strong>Sequential</strong>: current decisions affect future ones (e.g., chess — every move matters for what comes next).' },
  { topic:'ai', q:'Name the five components of a formal problem formulation in search.', a:'1. <strong>Initial state</strong> — where the agent starts. 2. <strong>Actions</strong> — what it can do. 3. <strong>Transition model</strong> — what results from each action. 4. <strong>Goal test</strong> — has the agent succeeded? 5. <strong>Path cost</strong> — how expensive is the route?' },
  { topic:'ai', q:'What is the key difference between Breadth-First Search (BFS) and Depth-First Search (DFS)?', a:'<strong>BFS</strong> explores level by level — complete and optimal for unit costs, but uses a lot of memory. <strong>DFS</strong> goes deep along one branch first — low memory use, but not complete in infinite spaces and not optimal.' },
  { topic:'ai', q:'What is A* search and what condition must its heuristic satisfy to guarantee optimality?', a:'A* uses <strong>f(n) = g(n) + h(n)</strong> — combining the cost to reach node n (g) with the estimated cost to the goal (h). It is optimal if h(n) is <strong>admissible</strong>: it never overestimates the true remaining cost.' },
  { topic:'ai', q:'What is an admissible heuristic? Give an example.', a:'A heuristic that <strong>never overestimates</strong> the true cost to the goal. Example: straight-line distance in a navigation problem — you can never travel less than the straight line between two points.' },
  { topic:'ai', q:'What is the difference between Greedy Best-First Search and A*?', a:'<strong>Greedy</strong> uses only h(n) — fast but not optimal, can be misled. <strong>A*</strong> uses f(n) = g(n) + h(n) — also considers the cost already paid, making it optimal if h is admissible.' },
  { topic:'ai', q:'What is Hill Climbing? What are its key weaknesses?', a:'A local search algorithm that always moves to the best neighbouring state. Weaknesses: gets stuck in <strong>local optima</strong> (a peak that is not the global best), <strong>plateaus</strong> (flat regions), and <strong>ridges</strong> (narrow peaks hard to traverse).' },
  { topic:'ai', q:'What is the Minimax algorithm? When is it used?', a:'A search algorithm for <strong>two-player zero-sum games</strong>. The maximizer tries to get the highest score; the minimizer tries to get the lowest. Minimax builds the full game tree and works backward to find the best move.' },
  { topic:'ai', q:'What does Alpha-Beta Pruning do, and what are α and β?', a:'An optimization of Minimax that <strong>prunes branches</strong> that cannot affect the result. <strong>α (alpha)</strong> = the best score the maximizer can guarantee so far. <strong>β (beta)</strong> = the best score the minimizer can guarantee so far.' },
  { topic:'ai', q:'What is the difference between a goal-based agent and a utility-based agent?', a:'A <strong>goal-based agent</strong> acts to reach a specific goal — it just needs to know whether a state is a goal or not. A <strong>utility-based agent</strong> maximizes a utility function — it can handle trade-offs between competing outcomes.' },
  { topic:'ai', q:'What is Uniform-Cost Search (UCS) and when does it outperform BFS?', a:'UCS expands the node with the lowest total path cost. It is complete and optimal even for <strong>varying step costs</strong>. BFS is only optimal when all steps have equal cost. UCS is effectively a generalisation of BFS.' },
  { topic:'ai', q:'Name and describe the five types of intelligent agents.', a:'1. <strong>Simple Reflex</strong> — acts on current percept only. 2. <strong>Model-Based Reflex</strong> — uses an internal model of the world. 3. <strong>Goal-Based</strong> — plans ahead toward a goal. 4. <strong>Utility-Based</strong> — maximizes a utility function. 5. <strong>Learning Agent</strong> — improves from experience.' },

  // ── FUZZY EXPERT SYSTEMS ────────────────────────────────────────────
  { topic:'fuzzy', q:'Why was fuzzy logic developed? What problem does it solve?', a:'Classical Boolean logic forces everything to be true (1) or false (0). Fuzzy logic, introduced by <strong>Lotfi Zadeh in 1965</strong>, allows partial truth — values between 0 and 1. This models vague, real-world concepts like "tall", "warm", or "risky" that cannot be perfectly captured by crisp boundaries.' },
  { topic:'fuzzy', q:'What is a fuzzy set? How does it differ from a crisp set?', a:'A <strong>crisp set</strong> has hard boundaries — an element either belongs or does not. A <strong>fuzzy set</strong> has soft boundaries — each element has a membership value between 0 and 1 indicating the degree to which it belongs. Example: a man of 184 cm might be 0.4 "tall" — partially in the set.' },
  { topic:'fuzzy', q:'What is a membership function? Name two common shapes.', a:'A <strong>membership function</strong> maps each value in the universe of discourse to a membership degree [0, 1]. Common shapes: <strong>triangular</strong> (simple, linear, cheap to compute) and <strong>trapezoidal</strong> (flat top for a range of full membership). Sigmoid and Gaussian are also used for smoother representations.' },
  { topic:'fuzzy', q:'What is a linguistic variable? Give an example with fuzzy rules.', a:'A linguistic variable takes <strong>words</strong> (linguistic values) instead of numbers. Example: "speed" with values "slow", "medium", "fast". Fuzzy rules: <em>IF speed is slow THEN stopping_distance is short</em>. The universe of discourse is the full range of the variable.' },
  { topic:'fuzzy', q:'What are linguistic hedges? Give one example and explain its mathematical effect.', a:'Hedges are <strong>adverbs that modify fuzzy sets</strong>. Example: <strong>"very"</strong> applies concentration — it squares membership values, narrowing the set and making the label more restrictive. "More or less" applies dilation — widening the set by taking the square root of membership values.' },
  { topic:'fuzzy', q:'How does the fuzzy AND (intersection) operation work?', a:'The AND operation takes the <strong>minimum</strong> of the membership values of the two fuzzy sets. Example: if "tall" membership = 0.7 and "heavy" membership = 0.4, then "tall AND heavy" = 0.4. This mirrors the idea that both conditions must be met.' },
  { topic:'fuzzy', q:'Describe the four steps of the Mamdani fuzzy inference process.', a:'1. <strong>Fuzzification</strong> — convert crisp inputs to membership values. 2. <strong>Rule Evaluation</strong> — apply rules (AND = min, OR = max). 3. <strong>Aggregation</strong> — combine all rule outputs into one fuzzy set. 4. <strong>Defuzzification</strong> — convert the fuzzy output to a crisp number (typically via centroid method).' },
  { topic:'fuzzy', q:'What is defuzzification? What is the most common method?', a:'Defuzzification converts an <strong>aggregated fuzzy output set back into a single crisp number</strong>. The most common method is the <strong>centroid (centre of gravity)</strong> method — the crisp output is the x-coordinate of the centroid of the output fuzzy set\'s area.' },
  { topic:'fuzzy', q:'What is the key difference between Mamdani and Sugeno inference?', a:'<strong>Mamdani (1975)</strong>: the consequent of each rule is a fuzzy set; defuzzification requires integration to find the centroid. <strong>Sugeno (1985)</strong>: the consequent is a mathematical function or constant (singleton). Output is a weighted average — no integration needed. Sugeno is computationally lighter and better for control systems.' },
  { topic:'fuzzy', q:'Why would you choose Sugeno over Mamdani?', a:'Sugeno is preferred when <strong>computational efficiency matters</strong> — it avoids the heavy integration step of Mamdani. It is also better suited for <strong>adaptive and optimization systems</strong> (e.g., ANFIS) because its output is a smooth mathematical function, making it easier to use with gradient-based learning.' },
  { topic:'fuzzy', q:'What are the five steps for building a fuzzy expert system?', a:'1. Define the problem and identify linguistic variables. 2. Define membership functions (triangles, trapezoids, etc.) from expert knowledge. 3. Formulate IF-THEN fuzzy rules from domain experts. 4. Choose an inference method (Mamdani or Sugeno). 5. Evaluate and iteratively tune the system — tuning is the most laborious part.' },
  { topic:'fuzzy', q:'What is the universe of discourse in fuzzy logic?', a:'The <strong>universe of discourse</strong> is the complete range of values a linguistic variable can take. For example, if "performance" ranges from 0 to 100, that is its universe of discourse. Membership functions are defined over this range.' },
  { topic:'fuzzy', q:'What is the fuzzy complement (NOT) operation?', a:'The complement of a fuzzy set A gives membership values of <strong>1 minus μ_A(x)</strong> for each element x. Example: if membership in "tall" is 0.7, then membership in "NOT tall" is 1 - 0.7 = 0.3.' },

  // ── SWARM INTELLIGENCE ──────────────────────────────────────────────
  { topic:'swarm', q:'What is Swarm Intelligence (SI)? Who coined the term?', a:'SI is the collective intelligent behaviour that emerges from <strong>decentralized, self-organized systems</strong> of simple agents following local rules. The term was coined by <strong>Gerardo Beni and Jing Wang in 1989</strong>. Examples: ant colonies, bee swarms, bird flocking, fish schooling.' },
  { topic:'swarm', q:'What is stigmergy? Which SI algorithm uses it?', a:'<strong>Stigmergy</strong> is indirect coordination through modifying the environment. Ants use it via <strong>pheromone trails</strong> — they communicate without direct contact by leaving chemical signals that others respond to. It is the core mechanism of <strong>Ant Colony Optimization (ACO)</strong>.' },
  { topic:'swarm', q:'In PSO, what do pbest and gbest represent?', a:'<strong>pbest (personal best)</strong>: the best position a particle has ever visited in its own history. <strong>gbest (global best)</strong>: the best position found by any particle in the entire swarm. Both attract the particle in the velocity update equation.' },
  { topic:'swarm', q:'Write out the PSO velocity update equation and explain each term.', a:'<strong>v(t+1) = w·v(t) + c1·r1·(pbest - x(t)) + c2·r2·(gbest - x(t))</strong>. w = inertia (keeps current direction). c1 = cognitive coefficient (pulls toward pbest). c2 = social coefficient (pulls toward gbest). r1, r2 = random numbers [0,1] for stochasticity.' },
  { topic:'swarm', q:'What is the inertia weight w in PSO and how does it affect behaviour?', a:'w controls how much the particle keeps its <strong>current velocity</strong>. <strong>High w</strong>: particle maintains direction — good for global exploration. <strong>Low w</strong>: particle slows and is pulled more strongly toward known good solutions — good for local exploitation.' },
  { topic:'swarm', q:'Describe the PSO algorithm step by step.', a:'1. Initialize particles at random positions with random velocities. 2. Evaluate fitness of each particle. 3. Update each particle\'s pbest if position improved. 4. Update gbest if any particle improved the global best. 5. Update all velocities. 6. Move all particles. 7. Repeat until stopping condition.' },
  { topic:'swarm', q:'How do real ants find the shortest path? How is this modelled in ACO?', a:'Ants explore randomly and deposit <strong>pheromone</strong>. Shorter paths are traversed more often, so they accumulate pheromone faster. Other ants prefer high-pheromone paths — a <strong>positive feedback loop</strong> that converges on the shortest route. ACO models this with pheromone deposit (∝ 1/Lk) and evaporation (rate ρ).' },
  { topic:'swarm', q:'Why is pheromone evaporation important in ACO?', a:'Evaporation prevents <strong>premature convergence</strong> — if old, suboptimal paths retained all their pheromone forever, the algorithm would get stuck. Evaporation forces the swarm to keep exploring. If ρ = 0 (no evaporation), the algorithm stagnates. If ρ = 1 (complete evaporation), all history is lost each iteration.' },
  { topic:'swarm', q:'What are the three bee roles in the ABC algorithm?', a:'<strong>Employed bees</strong>: each exploits one food source (solution), applies greedy selection, and shares info via waggle dance. <strong>Onlooker bees</strong>: choose a food source proportional to its fitness and also exploit it. <strong>Scout bees</strong>: when a source is exhausted (trial > limit), they abandon it and search randomly for a new one.' },
  { topic:'swarm', q:'What does the "limit" parameter control in ABC?', a:'The <strong>limit</strong> parameter defines how many trials an employed bee will attempt to improve a food source before abandoning it. If no improvement is found after "limit" trials, the bee becomes a <strong>scout</strong> and randomly searches for a new food source. This prevents stagnation on poor solutions.' },
  { topic:'swarm', q:'Name three applications of Ant Colony Optimization (ACO).', a:'1. <strong>Travelling Salesman Problem (TSP)</strong> — finding the shortest route visiting all cities. 2. <strong>Network routing and load balancing</strong> — dynamically finding efficient data paths. 3. <strong>Vehicle routing and scheduling</strong> — optimizing delivery or job sequences.' },
  { topic:'swarm', q:'How does PSO differ from ACO in terms of inspiration and mechanism?', a:'<strong>PSO</strong> is inspired by bird flocking/fish schooling — particles share a global best and update velocity based on personal and social memory. <strong>ACO</strong> is inspired by ant foraging — agents communicate indirectly through pheromone deposited in the environment (stigmergy). PSO suits continuous spaces; ACO suits combinatorial problems.' },

  // ── MACHINE LEARNING ────────────────────────────────────────────────
  { topic:'ml', q:'What is Machine Learning (ML)? Give Tom Mitchell\'s definition.', a:'ML is a branch of AI where systems <strong>learn from data</strong> to improve performance without being explicitly programmed. Mitchell (1997): "A program learns from experience E with respect to task T and performance measure P, if its performance at T, as measured by P, improves with E."' },
  { topic:'ml', q:'What are the three types of Machine Learning?', a:'1. <strong>Supervised Learning</strong>: learns from labelled data to map inputs to outputs (classification/regression). 2. <strong>Unsupervised Learning</strong>: finds patterns in unlabelled data (clustering/association). 3. <strong>Reinforcement Learning</strong>: agent learns through rewards and penalties from interacting with an environment.' },
  { topic:'ml', q:'What is the difference between classification and regression?', a:'<strong>Regression</strong>: predicts a <strong>continuous numerical value</strong> (e.g., house price, temperature). <strong>Classification</strong>: predicts a <strong>discrete category/class label</strong> (e.g., spam/not spam, disease/healthy). Both are supervised learning tasks.' },
  { topic:'ml', q:'How does the k-Nearest Neighbour (kNN) algorithm work?', a:'To classify a new point: find the <strong>k closest training examples</strong> by distance, then assign the <strong>most common class</strong> among them. No explicit training model — the entire dataset is the model. Key parameters: k (number of neighbours) and distance metric (Euclidean, Manhattan, etc.).' },
  { topic:'ml', q:'What is the effect of choosing a very small vs. very large k in kNN?', a:'<strong>Small k</strong> (e.g., k=1): very sensitive to noise and outliers — high variance, can overfit. <strong>Large k</strong>: smoother decision boundary — lower variance but can underfit and may include irrelevant neighbours. Optimal k is usually found by cross-validation.' },
  { topic:'ml', q:'What is overfitting? How can it be detected and prevented?', a:'<strong>Overfitting</strong>: model learns training data too well — including noise — and performs poorly on new data. <strong>Detection</strong>: high training accuracy but low test accuracy. <strong>Prevention</strong>: simplify the model, use regularization, gather more data, use cross-validation.' },
  { topic:'ml', q:'What is underfitting? How does it differ from overfitting?', a:'<strong>Underfitting</strong>: the model is too simple to capture the true pattern. Poor performance on both training AND test data. Unlike overfitting (too complex), underfitting is too simple. Solution: use a more complex model or add more relevant features.' },
  { topic:'ml', q:'What are the five key data preprocessing steps?', a:'1. Handle <strong>missing values</strong> (remove or impute). 2. Handle <strong>outliers</strong> (remove or cap). 3. <strong>Encode categorical data</strong> (one-hot encoding). 4. <strong>Feature scaling</strong> (normalize/standardize — critical for kNN, SVM). 5. <strong>Train/test split</strong> (typically 70-80% / 20-30%).' },
  { topic:'ml', q:'How does K-Means clustering work?', a:'1. Choose k initial centroids randomly. 2. Assign each point to the nearest centroid. 3. Recalculate each centroid as the mean of its assigned points. 4. Repeat steps 2-3 until centroids stop moving. Sensitive to outliers and initial centroid placement. Requires specifying k in advance.' },
  { topic:'ml', q:'How does DBSCAN differ from K-Means?', a:'<strong>DBSCAN</strong> is density-based: groups points in dense regions, marks sparse points as outliers. It <strong>does not require specifying k</strong>, can find clusters of any shape, and is robust to outliers. K-Means requires k, assumes spherical clusters, and is sensitive to outliers.' },
  { topic:'ml', q:'What is the Silhouette Score and what is it used for?', a:'The Silhouette Score measures how well each point fits its <strong>own cluster vs. neighbouring clusters</strong>. Values from -1 to +1: near +1 = well clustered, near 0 = on a boundary, near -1 = likely in the wrong cluster. Used to <strong>find the optimal k</strong> in K-Means.' },
  { topic:'ml', q:'What is Logistic Regression and why is it classification, not regression?', a:'Despite the name, Logistic Regression is a <strong>binary classification</strong> algorithm. It uses a sigmoid function to output a <strong>probability</strong> (0 to 1) that a sample belongs to a class, then thresholds at 0.5. The "regression" refers to the internal linear model, not the output type.' },
  { topic:'ml', q:'What is a confusion matrix? Name its four components.', a:'A confusion matrix shows the performance of a classifier. Components: <strong>True Positives (TP)</strong> — correctly predicted positive. <strong>True Negatives (TN)</strong> — correctly predicted negative. <strong>False Positives (FP)</strong> — incorrectly predicted positive. <strong>False Negatives (FN)</strong> — incorrectly predicted negative.' },
  { topic:'ml', q:'What is Principal Component Analysis (PCA) and when is it used?', a:'PCA is a <strong>dimensionality reduction</strong> technique. It projects data onto a smaller number of dimensions (principal components) while preserving as much <strong>variance</strong> as possible. Used to reduce noise, visualize high-dimensional data, and speed up downstream ML algorithms.' },

  // ── GENETIC ALGORITHMS ──────────────────────────────────────────────
  { topic:'ga', q:'What is a Genetic Algorithm (GA)? Who introduced it?', a:'A GA is a <strong>stochastic search and optimization algorithm</strong> based on biological evolution. Introduced by <strong>John Holland in the early 1970s</strong>. A population of candidate solutions (chromosomes) evolves over generations through selection, crossover, and mutation toward better solutions.' },
  { topic:'ga', q:'What is a chromosome and a gene in a GA?', a:'A <strong>chromosome</strong> is one complete candidate solution, encoded as a string of genes. A <strong>gene</strong> is one element of that string — representing one variable or part of the solution. In a binary GA, each gene is 0 or 1. In a continuous GA, each gene is a real number.' },
  { topic:'ga', q:'What is the fitness function in a GA?', a:'The fitness function (also called cost function) <strong>evaluates how good a chromosome is</strong>. The GA tries to maximize (or minimize) this value. It is the link between the chromosome representation and the real-world problem. Example: in the string-learning assignment, fitness rewards exact character matches.' },
  { topic:'ga', q:'Describe the GA cycle step by step.', a:'1. <strong>Initialization</strong>: random population. 2. <strong>Evaluation</strong>: calculate fitness of each chromosome. 3. <strong>Selection</strong>: pick parents (fitter = more likely). 4. <strong>Crossover</strong>: combine parents to produce offspring. 5. <strong>Mutation</strong>: randomly alter some genes. 6. <strong>(Elitism)</strong>: copy best to next generation. 7. <strong>Repeat</strong> until stopping condition.' },
  { topic:'ga', q:'How does Roulette Wheel Selection work?', a:'Each chromosome is assigned a <strong>slice of a roulette wheel proportional to its fitness</strong>. Higher-fitness chromosomes get larger slices and are more likely to be selected. The wheel is "spun" to pick each parent. Weakness: a single dominant chromosome can take over the population quickly.' },
  { topic:'ga', q:'How does Tournament Selection work? What does k control?', a:'Randomly sample <strong>k chromosomes</strong> from the population; the one with the <strong>highest fitness wins</strong> and becomes a parent. Repeat to pick the second parent. <strong>Larger k</strong> = stronger selection pressure toward fitter individuals. Smaller k = weaker pressure, more diversity.' },
  { topic:'ga', q:'Explain one-point, two-point, and uniform crossover.', a:'<strong>One-point</strong>: one cut point; child gets left from parent 1, right from parent 2. <strong>Two-point</strong>: two cuts; middle segment swapped. <strong>Uniform</strong>: each gene independently chosen from either parent (50/50). Uniform creates most diversity but can break beneficial gene combinations ("building blocks").' },
  { topic:'ga', q:'What is the typical crossover probability (pc) and what happens when crossover does not occur?', a:'Typically <strong>pc = 0.7</strong> (70% chance of crossover). When crossover does not occur (30% of the time), the parents are <strong>cloned</strong> into the next generation unchanged. This ensures some preservation of successful chromosomes without recombination.' },
  { topic:'ga', q:'Why is mutation important in a GA, even though pm is very low?', a:'Mutation <strong>prevents the population from becoming homogeneous</strong> (all chromosomes identical), which would trap the search in a local optimum. It is like a random search, maintaining genetic diversity. Typical pm = 0.001–0.01. Too low = premature convergence; too high = the GA degrades to random search.' },
  { topic:'ga', q:'What is elitism in a GA? Could it ever be harmful?', a:'<strong>Elitism</strong> copies the best chromosome(s) unchanged into the next generation, guaranteeing the best solution found is never lost. It could be harmful if it causes <strong>premature convergence</strong> — if a moderately good individual dominates and prevents the population from exploring better regions.' },
  { topic:'ga', q:'What is the difference between a binary GA and a continuous GA?', a:'<strong>Binary GA</strong>: genes are bits (0/1); continuous variables must be encoded into bit strings and decoded back. Simple and classical but can introduce representation inefficiencies. <strong>Continuous (real-valued) GA</strong>: genes are real numbers directly; no encoding needed; better suited for continuous optimization problems.' },
  { topic:'ga', q:'What is the Building Block Hypothesis and why does it explain why GAs work?', a:'The Building Block Hypothesis (Holland) states that GAs <strong>implicitly search for and combine short, high-fitness chromosome segments</strong> (building blocks or schemata). Crossover combines building blocks from different parents; selection amplifies the ones that work well. Over generations, increasingly fit combinations emerge.' },
  { topic:'ga', q:'What are the three stopping criteria for a GA?', a:'1. <strong>Maximum generations</strong>: stop after a fixed number of cycles (most common). 2. <strong>Target fitness</strong>: stop when a chromosome reaches a desired fitness (e.g., exact match). 3. <strong>Stagnation</strong>: stop when the best fitness has not improved for a set number of generations, saving computation when the search is stuck.' },
  { topic:'ga', q:'How does the mutation probability affect GA performance?', a:'<strong>Too low pm</strong>: the population converges too fast and gets trapped in a local optimum (premature convergence). <strong>Too high pm</strong>: the GA degenerates into random search — good solutions are destroyed as fast as they are found. Typical sweet spot: <strong>0.001 to 0.01</strong>.' },

  // ── HYBRID / BONUS ───────────────────────────────────────────────────
  { topic:'bonus', q:'What is a Hybrid Intelligent System?', a:'A system that <strong>combines at least two intelligent technologies</strong> to exploit their complementary strengths. Example: combining neural networks (learning ability) with fuzzy logic (interpretability) produces a neuro-fuzzy system that can both learn and explain its reasoning.' },
  { topic:'bonus', q:'Why are neural networks and fuzzy systems considered complementary?', a:'<strong>Neural networks</strong>: learn from data but are black-boxes — cannot explain decisions. <strong>Fuzzy systems</strong>: provide interpretable human-like reasoning but cannot learn from data. Combined in a neuro-fuzzy system, the neural network learns the membership functions and rules while the fuzzy layer remains interpretable.' },
  { topic:'bonus', q:'What is ANFIS and which fuzzy inference model does it correspond to?', a:'<strong>Adaptive Neuro-Fuzzy Inference System (ANFIS)</strong> is a neuro-fuzzy architecture equivalent to the <strong>Sugeno fuzzy model</strong>. It uses a hybrid learning algorithm: least-squares in the forward pass (for consequent parameters) and backpropagation in the backward pass (for antecedent parameters).' },
  { topic:'bonus', q:'What is the core of Soft Computing (SC)?', a:'The combination of <strong>probabilistic reasoning, fuzzy logic, neural networks, and evolutionary computation</strong>. Together they handle uncertainty, imprecision, and incomplete information in a way that mirrors human thinking. The term Soft Computing was established by <strong>Lotfi Zadeh in 1991</strong>.' },
  { topic:'bonus', q:'How can Genetic Algorithms (GAs) be used to improve neural networks?', a:'GAs can be used to <strong>optimize the weights</strong> of a neural network (instead of or alongside backpropagation) and to <strong>evolve the network topology</strong> (number of layers, neurons). Useful when the gradient is unavailable, unreliable, or the search space is highly non-convex.' },
];

// ── state ──────────────────────────────────────────────────────────────
let deck = [];
let current = 0;
let isFlipped = false;
let known = new Set();
let forReview = new Set();
let activeTopic = 'all';

function buildDeck() {
  deck = activeTopic === 'all'
    ? [...ALL_CARDS]
    : ALL_CARDS.filter(c => c.topic === activeTopic);
  known.clear();
  forReview.clear();
  current = 0;
  isFlipped = false;
  document.getElementById('done-state').classList.remove('visible');
  document.getElementById('card-scene').style.display = '';
  document.querySelector('.progress-wrap').style.display = '';
  document.querySelector('.controls').style.display = '';
  document.querySelector('.feedback-row').style.display = '';
  document.querySelector('.keyboard-hints') && (document.querySelector('.keyboard-hints').style.display = '');
  updateCard();
  updateStats();
}

function tagClass(topic) {
  return { ai:'tag-ai', fuzzy:'tag-fuzzy', swarm:'tag-swarm', ml:'tag-ml', ga:'tag-ga', bonus:'tag-bonus' }[topic] || '';
}

function tagLabel(topic) {
  return { ai:'AI Foundations', fuzzy:'Fuzzy Expert Systems', swarm:'Swarm Intelligence', ml:'Machine Learning', ga:'Genetic Algorithms', bonus:'Hybrid Systems' }[topic] || topic;
}

function updateCard() {
  if (deck.length === 0) return;
  const card = deck[current];
  const frontTag = document.getElementById('front-tag');
  frontTag.className = 'card-topic-tag ' + tagClass(card.topic);
  frontTag.textContent = tagLabel(card.topic);
  document.getElementById('card-question').textContent = card.q;
  document.getElementById('card-answer').innerHTML = card.a;
  document.getElementById('card-number').textContent = `Card ${current + 1} of ${deck.length}`;

  // reset flip
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('feedback-row').classList.remove('visible');

  // progress
  const done = known.size + forReview.size;
  const pct = deck.length ? (done / deck.length) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${deck.length}`;
}

function updateStats() {
  document.getElementById('stat-known').textContent = known.size;
  document.getElementById('stat-review').textContent = forReview.size;
  document.getElementById('stat-remaining').textContent = deck.length - known.size - forReview.size;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
  document.getElementById('feedback-row').classList.toggle('visible', isFlipped);
}

function nextCard() {
  if (current < deck.length - 1) {
    current++;
    updateCard();
  } else {
    showDone();
  }
}

function prevCard() {
  if (current > 0) {
    current--;
    updateCard();
  }
}

function markCard(wasKnown) {
  const idx = current;
  if (wasKnown) { known.add(idx); forReview.delete(idx); }
  else { forReview.add(idx); known.delete(idx); }
  updateStats();
  if (current < deck.length - 1) {
    current++;
    updateCard();
  } else {
    showDone();
  }
}

function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  known.clear(); forReview.clear(); current = 0;
  document.getElementById('done-state').classList.remove('visible');
  document.getElementById('card-scene').style.display = '';
  updateCard(); updateStats();
}

function resetCards() {
  buildDeck();
}

function reviewWrong() {
  const reviewDeck = [...forReview].map(i => deck[i]);
  if (reviewDeck.length === 0) { resetCards(); return; }
  deck = reviewDeck;
  known.clear(); forReview.clear(); current = 0;
  document.getElementById('done-state').classList.remove('visible');
  document.getElementById('card-scene').style.display = '';
  document.querySelector('.progress-wrap').style.display = '';
  document.querySelector('.controls').style.display = '';
  document.getElementById('feedback-row').style.display = '';
  updateCard(); updateStats();
}

function showDone() {
  const total = deck.length;
  const k = known.size;
  const r = forReview.size;
  const unseen = total - k - r;
  document.getElementById('card-scene').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  document.querySelector('.controls').style.display = 'none';
  document.getElementById('feedback-row').style.display = 'none';

  const ds = document.getElementById('done-state');
  document.getElementById('done-score').textContent = `${k} / ${total} correct`;
  let msg = '';
  const pct = total > 0 ? (k / total) * 100 : 0;
  if (pct === 100) msg = 'Perfect score! You know this topic inside out. 🌟';
  else if (pct >= 80) msg = `Great work! ${r} card${r!==1?'s':''} to review. You\'re well prepared.`;
  else if (pct >= 50) msg = `Good progress. ${r} card${r!==1?'s':''} still need practice — try the review mode.`;
  else msg = `Keep going! ${r} card${r!==1?'s':''} to review. Every repetition builds memory.`;
  document.getElementById('done-sub').textContent = msg;
  ds.classList.add('visible');

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-label').textContent = `${total} / ${total}`;
}

// ── filter buttons ──────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTopic = btn.dataset.topic;
    buildDeck();
  });
});

// ── keyboard ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch (e.key) {
    case ' ': e.preventDefault(); flipCard(); break;
    case 'ArrowRight': nextCard(); break;
    case 'ArrowLeft': prevCard(); break;
    case 'k': case 'K': if (isFlipped) markCard(true); break;
    case 'r': case 'R': if (isFlipped) markCard(false); break;
    case 's': case 'S': shuffleCards(); break;
  }
});

// ── init ──────────────────────────────────────────────────────────────
buildDeck();
</script>
