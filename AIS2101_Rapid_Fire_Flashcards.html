<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS2101 Rapid Fire Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--surface:#17171f;--card-front:#1c1c27;--card-back:#141b2d;--border:rgba(255,255,255,0.07);--accent:#ff7b4f;--accent2:#7b8cff;--accent3:#7bffd4;--text:#e8e8f0;--muted:#6b6b85;--tag-ai:#3b4fd4;--tag-fuzzy:#7b3bb8;--tag-swarm:#1d7a5c;--tag-ml:#7a3b1d;--tag-ga:#7a6b1d;--tag-hybrid:#4a4a6a;--tag-general:#8b2a2a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
header{padding:24px 40px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);}.logo span{color:var(--accent);}
.badge{background:rgba(255,123,79,0.15);border:1px solid rgba(255,123,79,0.3);color:var(--accent);font-size:0.72rem;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.08em;}
.stats{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);display:flex;gap:20px;}.stat-val{color:var(--accent);font-weight:500;}
.filters{padding:14px 40px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.78rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.filter-btn[data-topic="ai"].active{background:var(--tag-ai);border-color:var(--tag-ai);}
.filter-btn[data-topic="fuzzy"].active{background:var(--tag-fuzzy);border-color:var(--tag-fuzzy);}
.filter-btn[data-topic="swarm"].active{background:var(--tag-swarm);border-color:var(--tag-swarm);}
.filter-btn[data-topic="ml"].active{background:var(--tag-ml);border-color:var(--tag-ml);}
.filter-btn[data-topic="ga"].active{background:var(--tag-ga);border-color:var(--tag-ga);}
.filter-btn[data-topic="hybrid"].active{background:var(--tag-hybrid);border-color:var(--tag-hybrid);}
.filter-btn[data-topic="general"].active{background:var(--tag-general);border-color:var(--tag-general);}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:28px;}
.progress-wrap{width:100%;max-width:640px;display:flex;align-items:center;gap:14px;}
.progress-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#ffb347);border-radius:2px;transition:width 0.4s ease;}
.progress-label{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);white-space:nowrap;}
.card-scene{width:100%;max-width:640px;height:320px;perspective:1400px;cursor:pointer;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:1px solid var(--border);padding:32px 36px;display:flex;flex-direction:column;justify-content:space-between;transition:box-shadow 0.3s;}
.card-scene:hover .card-face{box-shadow:0 0 0 1px rgba(255,123,79,0.2),0 20px 60px rgba(0,0,0,0.5);}
.card-front{background:var(--card-front);}.card-back{background:var(--card-back);transform:rotateY(180deg);}
.card-topic-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;font-family:'DM Mono',monospace;align-self:flex-start;}
.tag-ai{background:rgba(59,79,212,0.25);color:#8fa3ff;}.tag-fuzzy{background:rgba(123,59,184,0.25);color:#c4a0ff;}
.tag-swarm{background:rgba(29,122,92,0.25);color:#7bffd4;}.tag-ml{background:rgba(122,59,29,0.25);color:#ffb07b;}
.tag-ga{background:rgba(122,107,29,0.25);color:#ffe07b;}.tag-hybrid{background:rgba(74,74,106,0.25);color:#b0b0d4;}
.tag-general{background:rgba(139,42,42,0.25);color:#ffaaaa;}
.card-question{font-family:'DM Serif Display',serif;font-size:1.5rem;line-height:1.4;color:var(--text);flex:1;display:flex;align-items:center;padding:16px 0 12px;}
.card-hint{font-size:0.74rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.card-answer-label{font-family:'DM Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);opacity:0.8;}
.card-answer{font-size:1rem;line-height:1.7;color:#c8c8e0;flex:1;display:flex;align-items:center;padding:14px 0;font-weight:300;}
.card-answer strong{color:var(--text);font-weight:600;}
.card-number{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);}
.feedback-row{display:flex;gap:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.feedback-row.visible{opacity:1;pointer-events:all;}
.controls{display:flex;gap:10px;align-items:center;}
.btn{padding:10px 22px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,123,79,0.08);}.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn-primary:hover{background:#ff9a6f;border-color:#ff9a6f;color:#fff;}
.btn-icon{padding:10px 13px;}
.btn-known{background:rgba(29,122,92,0.15);border-color:rgba(123,255,212,0.25);color:var(--accent3);}
.btn-known:hover{background:rgba(29,122,92,0.3);color:var(--accent3);border-color:var(--accent3);}
.btn-unknown{background:rgba(123,140,255,0.1);border-color:rgba(123,140,255,0.2);color:var(--accent2);}
.btn-unknown:hover{background:rgba(123,140,255,0.2);color:var(--accent2);border-color:var(--accent2);}
.done-state{text-align:center;display:none;flex-direction:column;align-items:center;gap:18px;padding:20px;}
.done-state.visible{display:flex;}
.done-emoji{font-size:3rem;}.done-title{font-family:'DM Serif Display',serif;font-size:2rem;}
.done-score{font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--accent);}
.done-sub{color:var(--muted);font-size:0.9rem;max-width:340px;line-height:1.6;}
.keyboard-hints{display:flex;gap:16px;font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;}
kbd{display:inline-block;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);font-family:'DM Mono',monospace;font-size:0.68rem;}
@media(max-width:640px){header{padding:18px 20px;}.filters{padding:12px 20px;}.main{padding:20px 14px;}.card-scene{height:360px;}.card-face{padding:24px 22px;}.card-question{font-size:1.2rem;}.keyboard-hints{display:none;}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo">AIS2101 <span>Rapid Fire</span></div>
    <div class="badge">Short Answer Mode</div>
  </div>
  <div class="stats">
    <span>Known: <span class="stat-val" id="stat-known">0</span></span>
    <span>Review: <span class="stat-val" id="stat-review">0</span></span>
    <span>Left: <span class="stat-val" id="stat-remaining">0</span></span>
  </div>
</header>
<div class="filters">
  <button class="filter-btn active" data-topic="all">All</button>
  <button class="filter-btn" data-topic="general">General AI</button>
  <button class="filter-btn" data-topic="ai">Search</button>
  <button class="filter-btn" data-topic="fuzzy">Fuzzy</button>
  <button class="filter-btn" data-topic="swarm">Swarm</button>
  <button class="filter-btn" data-topic="ml">ML</button>
  <button class="filter-btn" data-topic="ga">GA</button>
  <button class="filter-btn" data-topic="hybrid">Hybrid</button>
</div>
<div class="main">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 0</div>
  </div>
  <div class="card-scene" id="card-scene" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front">
        <div class="card-topic-tag" id="front-tag"></div>
        <div class="card-question" id="card-question"></div>
        <div class="card-hint"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>Click to reveal answer</div>
      </div>
      <div class="card-face card-back">
        <div class="card-answer-label">Answer</div>
        <div class="card-answer" id="card-answer"></div>
        <div class="card-number" id="card-number"></div>
      </div>
    </div>
  </div>
  <div class="feedback-row" id="feedback-row">
    <button class="btn btn-unknown" onclick="markCard(false)">&#x2717; Review</button>
    <button class="btn btn-known" onclick="markCard(true)">&#x2713; Got It</button>
  </div>
  <div class="controls">
    <button class="btn btn-icon" onclick="prevCard()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg></button>
    <button class="btn btn-primary" onclick="nextCard()">Next &rarr;</button>
    <button class="btn btn-icon" onclick="shuffleCards()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/></svg></button>
    <button class="btn btn-icon" onclick="resetCards()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.83"/></svg></button>
  </div>
  <div class="keyboard-hints">
    <span><kbd>Space</kbd> flip</span><span><kbd>&rarr;</kbd> next</span><span><kbd>&larr;</kbd> prev</span><span><kbd>K</kbd> got it</span><span><kbd>R</kbd> review</span><span><kbd>S</kbd> shuffle</span>
  </div>
  <div class="done-state" id="done-state">
    <div class="done-emoji">&#x1F525;</div>
    <div class="done-title">Rapid Fire Complete!</div>
    <div class="done-score" id="done-score"></div>
    <div class="done-sub" id="done-sub"></div>
    <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center;">
      <button class="btn btn-primary" onclick="resetCards()">Go Again</button>
      <button class="btn" onclick="reviewWrong()">Review Missed</button>
    </div>
  </div>
</div>
<script>
const C=[
{t:'general',q:'What is the Turing Test?',a:'A test for machine intelligence. A computer passes if a human interrogator cannot distinguish it from a human through text-based conversation. Defines intelligent behaviour as achieving human-level performance in cognitive tasks.'},
{t:'general',q:'What is the Advanced (Total) Turing Test?',a:'An extension of the standard Turing Test that additionally requires computer vision, speech recognition and robotic manipulation — not just linguistic intelligence.'},
{t:'general',q:'What is the key difference between the standard and Advanced Turing Test?',a:'The standard test only evaluates text-based linguistic intelligence. The advanced test also requires the machine to see, hear, speak and physically interact with the world.'},
{t:'general',q:'What is an expert system?',a:'A computer system that captures and uses human expert knowledge in a specific domain. Consists of a knowledge base of IF-THEN rules and an inference engine that applies those rules.'},
{t:'general',q:'What is a knowledge base?',a:'The core of an expert system — stores domain knowledge as IF-THEN production rules and facts. Separated from the inference engine, making the system easy to update.'},
{t:'general',q:'What is an inference engine?',a:'The reasoning component of an expert system. Matches rules in the knowledge base against facts to reach conclusions. Uses forward or backward chaining.'},
{t:'general',q:'What is forward chaining?',a:'Data-driven reasoning. Starts from known facts and applies rules forward until no more rules can fire. Used for analysis and interpretation problems.'},
{t:'general',q:'What is backward chaining?',a:'Goal-driven reasoning. Starts with a hypothetical solution and works backward to find facts that prove it. Used for diagnostic problems.'},
{t:'general',q:'When would you use forward vs backward chaining?',a:'Forward: when you have data and want to infer everything possible from it. Backward: when you have a specific goal and want to find evidence to prove it.'},
{t:'general',q:'What is a heuristic?',a:'A rule of thumb developed from experience that usually — but not always — yields a correct solution. Reduces complex problems to simpler judgement-based operations.'},
{t:'general',q:'What is soft computing?',a:'An approach tolerating imprecision, uncertainty and partial truth — mirroring human reasoning. Combines fuzzy logic, neural networks, probabilistic reasoning and evolutionary computation.'},
{t:'general',q:'What is hard computing?',a:'Traditional computing requiring precise, crisp inputs and exact mathematical models. Fails when data is vague, incomplete or uncertain.'},
{t:'general',q:'What are the four components of soft computing?',a:'Probabilistic reasoning (uncertainty), Fuzzy logic (imprecision), Neural networks (learning from data), Evolutionary computation (optimization).'},
{t:'general',q:'What is the definition of intelligence?',a:'The ability to learn and understand, to solve problems and to make decisions.'},
{t:'general',q:'What is a production rule?',a:'An IF-THEN rule used in expert systems. The IF part is the condition (antecedent); the THEN part is the action (consequent). When the condition matches facts, the rule fires.'},
{t:'general',q:'What makes expert systems different from conventional programs?',a:'Expert systems separate knowledge from processing (knowledge base + inference engine). They handle incomplete and uncertain data, can explain their reasoning, and are easy to update by adding rules.'},
{t:'general',q:'What is knowledge engineering?',a:'The process of building intelligent systems — capturing, organising and encoding human expert knowledge. Deals with expert systems, neural networks and fuzzy logic.'},
{t:'ai',q:'What is a rational agent?',a:'An agent that acts to maximise its expected performance measure, given its current knowledge and what it perceives. It does the best it can with what it knows.'},
{t:'ai',q:'What does PEAS stand for?',a:'Performance measure, Environment, Actuators, Sensors. A framework to fully describe any intelligent agent.'},
{t:'ai',q:'What is the difference between fully and partially observable environments?',a:'Fully observable: agent sees everything relevant at once (chess). Partially observable: information is hidden (poker — opponent\'s cards are unknown).'},
{t:'ai',q:'What is a deterministic vs stochastic environment?',a:'Deterministic: same action always produces same result (chess). Stochastic: outcomes are uncertain (driving — pedestrians may step out unexpectedly).'},
{t:'ai',q:'What is an episodic vs sequential environment?',a:'Episodic: each decision is independent (spam filtering). Sequential: past decisions affect future ones (chess — every move matters).'},
{t:'ai',q:'What is a static vs dynamic environment?',a:'Static: does not change while agent thinks (chess). Dynamic: changes even while agent deliberates (driving).'},
{t:'ai',q:'What is an admissible heuristic?',a:'A heuristic that never overestimates the true cost to the goal. Required for A* to guarantee optimality. Example: straight-line distance in navigation.'},
{t:'ai',q:'What is the f(n) function in A*?',a:'f(n) = g(n) + h(n). g(n) = actual cost to reach node n. h(n) = estimated cost from n to the goal. A* always expands the node with lowest f(n).'},
{t:'ai',q:'Why is DFS not optimal?',a:'DFS finds the first solution it reaches — not necessarily the shortest or cheapest. It can also get stuck in infinite branches without cycle detection.'},
{t:'ai',q:'What is the memory trade-off between BFS and DFS?',a:'BFS stores all frontier nodes — very memory hungry: O(b^d). DFS stores only the current path — much more efficient: O(bm). DFS trades optimality for memory.'},
{t:'ai',q:'What is a local optimum in Hill Climbing?',a:'A state better than all immediate neighbours but not the global best. Hill Climbing gets stuck here because it never moves to a worse state.'},
{t:'ai',q:'What is Alpha-Beta Pruning?',a:'An optimization of Minimax that skips branches which cannot affect the final result — same answer as Minimax, computed faster.'},
{t:'ai',q:'What is UCS and when is it better than BFS?',a:'Uniform-Cost Search expands the node with lowest total path cost. Better than BFS when step costs vary — BFS only finds the shallowest solution, not the cheapest.'},
{t:'ai',q:'What is the difference between a goal-based and utility-based agent?',a:'Goal-based: acts to reach a specific goal. Utility-based: maximises a utility function — handles trade-offs between competing outcomes.'},
{t:'ai',q:'What are the five components of problem formulation?',a:'Initial state, Actions, Transition model, Goal test, Path cost.'},
{t:'ai',q:'What is a simple reflex agent?',a:'Acts only on the current percept using condition-action rules. No memory or history. Example: hospital monitor that fires an alert when a vital sign crosses a threshold.'},
{t:'fuzzy',q:'What is a membership value?',a:'A number between 0 and 1 expressing the degree to which an element belongs to a fuzzy set. 0 = no membership, 1 = full membership.'},
{t:'fuzzy',q:'What is the universe of discourse?',a:'The complete range of all possible values a linguistic variable can take. Membership functions are defined over this range.'},
{t:'fuzzy',q:'What is fuzzification?',a:'The first step of fuzzy inference — converting a crisp numerical input into degrees of membership across fuzzy sets.'},
{t:'fuzzy',q:'What is aggregation in fuzzy inference?',a:'The third step — combining all individual rule output fuzzy sets into one single output fuzzy set before defuzzification.'},
{t:'fuzzy',q:'What is the centroid defuzzification method?',a:'The most common method. The crisp output is the x-coordinate of the centre of gravity of the aggregated output fuzzy set.'},
{t:'fuzzy',q:'What is the fuzzy complement (NOT) operation?',a:'"NOT tall" = 1 minus the membership value of "tall". If tall = 0.7, then NOT tall = 0.3.'},
{t:'fuzzy',q:'What does "very" do to a membership function?',a:'Concentration — squares the membership values, narrowing the fuzzy set. "Very tall" is more restrictive than "tall".'},
{t:'fuzzy',q:'What does "more or less" do to a membership function?',a:'Dilation — takes the square root of membership values, widening the fuzzy set. More elements qualify.'},
{t:'fuzzy',q:'What is a singleton in Sugeno inference?',a:'A fuzzy set with membership 1 at exactly one point and 0 everywhere else. Used as rule consequents in Sugeno, making defuzzification a simple weighted average.'},
{t:'fuzzy',q:'What is the FRAD memory trick?',a:'Fuzzification → Rule evaluation → Aggregation → Defuzzification. The four steps of Mamdani fuzzy inference in order.'},
{t:'fuzzy',q:'Why is Sugeno faster than Mamdani?',a:'Sugeno uses singletons as rule outputs — the final answer is a weighted average, skipping the heavy integration step needed to find Mamdani\'s centroid.'},
{t:'fuzzy',q:'What is the fuzzy AND operation?',a:'Takes the minimum of the two membership values. "Tall AND heavy" with tall=0.7 and heavy=0.4 gives 0.4.'},
{t:'fuzzy',q:'What is the fuzzy OR operation?',a:'Takes the maximum of the two membership values. "Tall OR heavy" with tall=0.7 and heavy=0.4 gives 0.7.'},
{t:'fuzzy',q:'What is the difference between a crisp set and a fuzzy set?',a:'Crisp set: hard boundaries — element either belongs or does not. Fuzzy set: soft boundaries — elements have a degree of membership between 0 and 1.'},
{t:'fuzzy',q:'Why was fuzzy logic developed?',a:'Classical Boolean logic cannot handle vague concepts like "tall" or "warm". Fuzzy logic allows partial truth, better modelling how humans reason.'},
{t:'fuzzy',q:'What are hedges in fuzzy logic?',a:'Adverbs that modify fuzzy sets — like "very", "more or less", "slightly". They perform mathematical operations that narrow or widen the membership function.'},
{t:'fuzzy',q:'What is a linguistic variable?',a:'A variable that takes words (linguistic values) instead of numbers. Example: "speed" with values "slow", "medium", "fast" — each represented by a fuzzy set.'},
{t:'swarm',q:'What is Swarm Intelligence?',a:'Collective intelligent behaviour emerging from decentralized, self-organized systems of simple agents following local rules — like ant colonies, bee swarms and bird flocks.'},
{t:'swarm',q:'What is stigmergy?',a:'Indirect coordination by modifying the environment. Ants communicate by depositing pheromone on paths — other ants respond without any direct contact.'},
{t:'swarm',q:'What is pbest in PSO?',a:'Personal best — the best position a particle has ever found in its own history. Pulls the particle back toward its own best known location.'},
{t:'swarm',q:'What is gbest in PSO?',a:'Global best — the best position found by any particle in the entire swarm. Pulls all particles toward the swarm\'s best known solution.'},
{t:'swarm',q:'What does the inertia weight w control in PSO?',a:'How much the particle keeps its current velocity. High w = broad exploration. Low w = local exploitation of known good areas.'},
{t:'swarm',q:'What is the cognitive coefficient c1 in PSO?',a:'Controls how strongly a particle is pulled toward its own pbest. Represents individual memory and personal experience.'},
{t:'swarm',q:'What is the social coefficient c2 in PSO?',a:'Controls how strongly a particle is pulled toward gbest. Represents social learning — the particle follows the swarm\'s collective best.'},
{t:'swarm',q:'What is the "limit" parameter in ABC?',a:'The maximum number of trials an employed bee attempts to improve a food source before abandoning it and becoming a scout bee.'},
{t:'swarm',q:'What is premature convergence?',a:'When a swarm converges too early on a suboptimal solution. Prevented by pheromone evaporation (ACO), inertia weight (PSO) and scout bees (ABC).'},
{t:'swarm',q:'What is a meta-heuristic?',a:'A high-level optimization strategy applicable to many different problem types — not designed for one specific problem. PSO, ACO, ABC and GAs are all meta-heuristics.'},
{t:'swarm',q:'Why is ACO better suited for TSP than PSO?',a:'TSP is a discrete graph-based problem. ACO naturally navigates graphs by choosing between edges at each decision point. PSO uses continuous mathematics and suits continuous spaces.'},
{t:'swarm',q:'What is exploration vs exploitation in PSO?',a:'Exploration: searching broadly across the whole search space. Exploitation: focusing on known good areas. High w favours exploration; low w favours exploitation.'},
{t:'swarm',q:'Why is pheromone evaporation necessary in ACO?',a:'Without evaporation, old suboptimal paths retain pheromone forever and the algorithm gets stuck. Evaporation forces continued exploration and prevents premature convergence.'},
{t:'swarm',q:'What role do scout bees play in ABC?',a:'When a food source fails to improve after "limit" trials, its employed bee becomes a scout and randomly searches for a new source — preventing stagnation on poor solutions.'},
{t:'swarm',q:'What are the three bee roles in ABC?',a:'Employed bees: exploit assigned food sources and share info. Onlooker bees: choose sources proportional to fitness and also exploit them. Scout bees: abandon exhausted sources and search randomly.'},
{t:'ml',q:'What is the key difference between supervised and unsupervised learning?',a:'Supervised uses labelled data — each input has a known correct output. Unsupervised has no labels — the algorithm finds patterns or structure on its own.'},
{t:'ml',q:'What is classification vs regression?',a:'Classification predicts a discrete category (spam/not spam). Regression predicts a continuous number (house price, temperature).'},
{t:'ml',q:'What is a hyperparameter?',a:'A parameter set by the developer before training — not learned from data. Examples: k in kNN, number of clusters in K-Means, epsilon in DBSCAN.'},
{t:'ml',q:'What is overfitting?',a:'The model learns training data too well — including noise — and performs poorly on new data. Detected by high training accuracy but low test accuracy.'},
{t:'ml',q:'What is underfitting?',a:'The model is too simple to capture the true pattern. Poor performance on both training and test data.'},
{t:'ml',q:'What is a confusion matrix?',a:'A table showing classifier performance: True Positives, True Negatives, False Positives (predicted positive, actually negative) and False Negatives (predicted negative, actually positive).'},
{t:'ml',q:'Why is accuracy misleading for imbalanced classes?',a:'A model predicting only the majority class gets high accuracy while being useless for detecting the minority class. Better metrics: precision, recall, F1-score.'},
{t:'ml',q:'What is a dendrogram?',a:'The tree diagram output of hierarchical clustering — shows how data objects are progressively merged. The cut-off line determines the final number of clusters.'},
{t:'ml',q:'What are the two key parameters of DBSCAN?',a:'Epsilon: maximum distance between two points to be neighbours. MinPts: minimum number of points to form a dense region (core point).'},
{t:'ml',q:'What is feature scaling and why does it matter?',a:'Normalizing features so none dominates due to scale. Critical for kNN and SVM which use distance metrics — large-scale features would otherwise overpower small-scale ones.'},
{t:'ml',q:'What is regularization?',a:'A technique preventing overfitting by penalizing overly complex models mathematically, forcing them to stay simpler and generalize better.'},
{t:'ml',q:'What does a Silhouette Score of -1 mean?',a:'The data point is likely assigned to the wrong cluster — it fits a neighbouring cluster better than its own.'},
{t:'ml',q:'When would you prefer DBSCAN over K-Means?',a:'When the number of clusters is unknown, clusters may be irregularly shaped, or outliers need to be identified rather than forced into a group.'},
{t:'ml',q:'What is the key weakness of K-Means?',a:'You must specify k in advance. It assumes spherical clusters of similar size and is sensitive to outliers.'},
{t:'ml',q:'What is reinforcement learning?',a:'An agent learns through rewards and penalties from interacting with an environment. Finds the best sequence of actions to maximise cumulative reward. Used in robotics and game playing.'},
{t:'ml',q:'What is kNN?',a:'K-Nearest Neighbour. To classify a new point: find the k closest training examples by distance and assign the most common class among them. The dataset itself is the model.'},
{t:'ga',q:'What are the three main genetic operators?',a:'Selection (choosing which chromosomes reproduce), Crossover (combining parents to produce offspring) and Mutation (randomly altering genes to maintain diversity).'},
{t:'ga',q:'What is a chromosome in a GA?',a:'A single candidate solution encoded as a string of genes. Binary GA: string of 0s and 1s. Continuous GA: string of real numbers.'},
{t:'ga',q:'What is the fitness function?',a:'A mathematical function that scores how good each chromosome is. The GA maximises (or minimises) this over generations. Also called the cost function.'},
{t:'ga',q:'What is elitism?',a:'Copying the best chromosome(s) unchanged into the next generation, guaranteeing the best solution found is never lost.'},
{t:'ga',q:'What is roulette wheel selection?',a:'Each chromosome gets a slice of a roulette wheel proportional to its fitness. Higher fitness = larger slice = higher chance of selection.'},
{t:'ga',q:'What is tournament selection?',a:'Randomly sample k chromosomes; the one with highest fitness wins and becomes a parent. Larger k = stronger selection pressure toward fitter individuals.'},
{t:'ga',q:'What is rank selection?',a:'Chromosomes ranked by fitness; selection probability based on rank position rather than raw score. Prevents one dominant chromosome from taking over the population.'},
{t:'ga',q:'What is the difference between one-point and uniform crossover?',a:'One-point: one cut point, child gets left from parent 1 and right from parent 2. Uniform: each gene independently chosen 50/50 from either parent. Uniform creates more diversity but can break building blocks.'},
{t:'ga',q:'What is the typical crossover probability?',a:'0.7 — crossover occurs 70% of the time. When it does not, parents are cloned unchanged into the next generation.'},
{t:'ga',q:'What is the typical mutation probability?',a:'0.001 to 0.01. Kept very low — enough to maintain diversity without degenerating into random search.'},
{t:'ga',q:'What happens if mutation probability is too high?',a:'The GA degenerates into random search — good solutions are destroyed as fast as they are found and the population never converges.'},
{t:'ga',q:'What is a homogeneous population?',a:'All chromosomes in the population are identical. Crossover can no longer produce new solutions. The GA gets stuck — mutation is the only escape.'},
{t:'ga',q:'What is the Building Block Hypothesis?',a:'GAs work by implicitly searching for and combining short, high-fitness chromosome segments (building blocks). Crossover combines them; selection amplifies the best. Fit solutions emerge over generations.'},
{t:'ga',q:'When would you prefer GA over PSO?',a:'When the problem is discrete or combinatorial. GA chromosome encoding handles both discrete and continuous problems; PSO is naturally suited only to continuous spaces.'},
{t:'ga',q:'What are the three stopping criteria for a GA?',a:'Maximum generations (most common), Target fitness (stop when goal is reached), Stagnation (stop when best fitness has not improved for a set number of generations).'},
{t:'hybrid',q:'What is a hybrid intelligent system?',a:'A system combining at least two intelligent technologies to exploit their complementary strengths — producing a system stronger than any single technology alone.'},
{t:'hybrid',q:'Why are fuzzy systems and neural networks natural partners?',a:'Fuzzy systems are explainable but cannot learn. Neural networks learn from data but are black-boxes. Combined: the NN learns rules automatically; the fuzzy layer keeps results interpretable.'},
{t:'hybrid',q:'What is ANFIS?',a:'Adaptive Neuro-Fuzzy Inference System — a neuro-fuzzy architecture equivalent to the Sugeno model. Uses a hybrid learning algorithm: least-squares (forward pass) and backpropagation (backward pass).'},
{t:'hybrid',q:'What does the ANFIS forward pass learn?',a:'The consequent parameters — coefficients of the output functions in each Sugeno rule. Identified using the Least-Squares Estimator.'},
{t:'hybrid',q:'What does the ANFIS backward pass learn?',a:'The antecedent parameters — shapes of the input membership functions. Updated using Gradient Descent / Backpropagation.'},
{t:'hybrid',q:'How many layers does a neuro-fuzzy system have and which fuzzy model does it correspond to?',a:'5 layers — Mamdani model. Layers: Input → Fuzzification → Fuzzy Rules → Output Membership → Defuzzification.'},
{t:'hybrid',q:'How many layers does ANFIS have and which fuzzy model does it correspond to?',a:'6 layers — Sugeno model. Adds a normalisation layer, enabling weighted average output without heavy integration.'},
{t:'hybrid',q:'What is a fuzzy evolutionary system?',a:'Uses a GA to select the best small subset of fuzzy rules from a large automatically generated rule base — cutting rules to less than 2% while maintaining accuracy.'},
{t:'hybrid',q:'Which technology is best at explanation ability — FS, NN or GA?',a:'Fuzzy Systems (FS) — they produce human-readable IF-THEN rules. Neural networks and GAs are both poor at explaining their decisions.'},
{t:'hybrid',q:'Which technology is best at learning ability?',a:'Neural Networks (NN) — they learn patterns directly from raw data. Fuzzy systems cannot learn; GAs learn through evolutionary search but not in the same direct sense.'},
{t:'hybrid',q:'What is the main advantage of a neuro-fuzzy system over a standalone fuzzy system?',a:'Removes the need for a human expert to manually create every membership function and rule — the neural network learns them automatically from data.'},
{t:'hybrid',q:'What is the main advantage of a neuro-fuzzy system over a standalone neural network?',a:'The fuzzy layer makes the system interpretable — learned knowledge can be read as human-understandable IF-THEN linguistic rules.'},
{t:'hybrid',q:'How can GAs be used to improve a neural network?',a:'GAs can optimise the network\'s weights (instead of backpropagation) or evolve its topology (layers, neurons, connections). Useful when no gradient is available.'},
];

let deck=[],cur=0,flipped=false,known=new Set(),review=new Set(),topic='all';
function build(){
  deck=topic==='all'?[...C]:C.filter(c=>c.t===topic);
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  known.clear();review.clear();cur=0;flipped=false;
  document.getElementById('done-state').classList.remove('visible');
  document.getElementById('card-scene').style.display='';
  document.querySelector('.progress-wrap').style.display='';
  document.querySelector('.controls').style.display='';
  document.getElementById('feedback-row').style.display='';
  render();stats();
}
const TC={ai:'tag-ai',fuzzy:'tag-fuzzy',swarm:'tag-swarm',ml:'tag-ml',ga:'tag-ga',hybrid:'tag-hybrid',general:'tag-general'};
const TL={ai:'Search',fuzzy:'Fuzzy',swarm:'Swarm',ml:'ML',ga:'GA',hybrid:'Hybrid',general:'General AI'};
function render(){
  if(!deck.length)return;
  const c=deck[cur];
  const ft=document.getElementById('front-tag');
  ft.className='card-topic-tag '+(TC[c.t]||'');ft.textContent=TL[c.t]||c.t;
  document.getElementById('card-question').textContent=c.q;
  document.getElementById('card-answer').textContent=c.a;
  document.getElementById('card-number').textContent='Card '+(cur+1)+' of '+deck.length;
  flipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('feedback-row').classList.remove('visible');
  const done=known.size+review.size;
  const pct=deck.length?(done/deck.length)*100:0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=done+' / '+deck.length;
}
function stats(){
  document.getElementById('stat-known').textContent=known.size;
  document.getElementById('stat-review').textContent=review.size;
  document.getElementById('stat-remaining').textContent=deck.length-known.size-review.size;
}
function flipCard(){flipped=!flipped;document.getElementById('card-inner').classList.toggle('flipped',flipped);document.getElementById('feedback-row').classList.toggle('visible',flipped);}
function nextCard(){if(cur<deck.length-1){cur++;render();}else done();}
function prevCard(){if(cur>0){cur--;render();}}
function markCard(ok){if(ok){known.add(cur);review.delete(cur);}else{review.add(cur);known.delete(cur);}stats();if(cur<deck.length-1){cur++;render();}else done();}
function shuffleCards(){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}known.clear();review.clear();cur=0;document.getElementById('done-state').classList.remove('visible');document.getElementById('card-scene').style.display='';render();stats();}
function resetCards(){build();}
function reviewWrong(){const rd=[...review].map(i=>deck[i]);if(!rd.length){build();return;}deck=rd;known.clear();review.clear();cur=0;document.getElementById('done-state').classList.remove('visible');document.getElementById('card-scene').style.display='';render();stats();}
function done(){
  const total=deck.length,k=known.size,pct=total>0?(k/total)*100:0;
  document.getElementById('card-scene').style.display='none';
  document.querySelector('.progress-wrap').style.display='none';
  document.querySelector('.controls').style.display='none';
  document.getElementById('feedback-row').style.display='none';
  document.getElementById('done-score').textContent=k+' / '+total+' correct';
  document.getElementById('done-sub').textContent=pct===100?'Perfect! Every definition nailed. \u2b50':pct>=80?'Really strong \u2014 nearly exam ready on this set.':pct>=60?'Good progress. Review the missed ones and go again.':'Keep drilling \u2014 repetition is how definitions stick.';
  document.getElementById('done-state').classList.add('visible');
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-label').textContent=total+' / '+total;
}
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');topic=btn.dataset.topic;build();
  });
});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key===' '){e.preventDefault();flipCard();}
  else if(e.key==='ArrowRight')nextCard();
  else if(e.key==='ArrowLeft')prevCard();
  else if(e.key==='k'||e.key==='K'){if(flipped)markCard(true);}
  else if(e.key==='r'||e.key==='R'){if(flipped)markCard(false);}
  else if(e.key==='s'||e.key==='S')shuffleCards();
});
build();
</script>
</body>
</html>
